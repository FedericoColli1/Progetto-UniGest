services:
    web-server-frontend:
        container_name: web-server-frontend
        hostname: web-server-frontend
        image: web-server-frontend
        build:
            context: .
            dockerfile: ./Dockerfile-frontend
        volumes:
            - ../frontend/:/var/www/html/
        ports:
            - 80:80

    web-server-backend:
        container_name: web-server-backend
        hostname: web-server-backend
        image: web-server-backend
        build:
            context: .
            dockerfile: ./Dockerfile-backend
        volumes:
            - ../backend/:/var/www/api/
            - documenti:/var/www/api/documenti
        ports:
            - 8080:8080
        environment:
            - MYSQL_HOST=php_docker
            - MYSQL_USER=${MYSQL_USER}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD}
            - MYSQL_DATABASE=${MYSQL_DATABASE}
        depends_on:
            - php_docker
        
    php_docker:
        container_name: php_docker
        hostname: php_docker
        image: php_docker
        build:
            context: .
            dockerfile: ./Dockerfile-db
        environment:
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
            - ${MYSQL_PORT}:3306
        volumes:
            - ./db_data/:/docker-entrypoint-initdb.d/

    web-server-phpmyadmin:
        image: phpmyadmin/phpmyadmin
        ports:
            - 8001:80
        environment:
            - PMA_HOST=php_docker
            - PMA_PORT=3306

    test:
        container_name: test
        hostname: test
        image: test
        build:
            context: .
            dockerfile: ./Dockerfile-test
        volumes:
            - ./../:/tests
            - documenti:/var/www/api/documenti
        environment:
            - MYSQL_HOST=php_docker
            - MYSQL_USER=${MYSQL_USER}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD}
            - MYSQL_DATABASE=${MYSQL_DATABASE}
        depends_on:
            - php_docker

volumes:
    documenti:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: ../documenti
        labels:
            environment: documenti