<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuova Pratica</title>

    <!-- Bootstrap1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/panel.css">
    <link rel="stylesheet" href="../css/nuovaPratica.css">

</head>


<body>
    <!-- Sidebar -->
    <div class="sidebar "> <!-- Barra in alto -->
        <div class="logo-details">
            <div class="logo_name">uni<b>GEST</b></div>
            <i class='bx bx-menu' id="btn"></i>
        </div>

        <ul class="nav-list"> <!-- Elementi Cliccabili -->
            <li>
                <div id="linkDasboardDinamico">

                </div>
                <span class="tooltip">Dashboard</span>
            </li>
            <li>
                <a href="">
                    <i class='bx bxs-file-plus'></i>
                    <span class="links_name">Nuova pratica</span>
                </a>
                <span class="tooltip">Nuova pratica</span>
            </li>
            <!-- <li>
                <a href="">
                    <i class='bx bx-folder'></i>
                    <span class="links_name">Files</span>
                </a>
                <span class="tooltip">Files</span>
            </li>
            <li>
                <a href="">
                    <i class='bx bx-heart'></i>
                    <span class="links_name">Saved</span>
                </a>
                <span class="tooltip">Saved</span>
            </li>
            <li>
                <a href="">
                    <i class='bx bx-cog'></i>
                    <span class="links_name">Settings</span>
                </a>
                <span class="tooltip">Settings</span>
            </li> -->
            <li class="profile">
                <i class='bx bx-log-out' id="log_out"></i>
            </li>
        </ul>
    </div>
    <!-- Fine Sidebar -->

    <!-- Resto della pagina -->
    <div class="container-fluid h-100">


        <div class="row h-80 justify-content-center ">
            <div class="col-11 d-flex tableContainer">
                <div class="rounded-3 overflow-hidden w-100">
                    <!-- <div class="simulatore"> -->

                    <form>
                        <div class=" mb-3">
                            <label for="inputGroupSelect01" class="form-label">Tipologia</label>
                            <select class="form-select" name="formSelect1" id="inputGroupSelect01">
                                <!-- 
                                <option value="Tipo A">Tipo A</option>
                                <option value="Tipo B">Tipo B</option>
                                <option value="Tipo C">Tipo C</option>
                                <option value="Tipo D">Tipo D</option> -->
                            </select>
                        </div>


                        <div class="mb-3">
                            <label for="descrizione" class="form-label">Descrizione</label>
                            <textarea class="form-control" id="descrizione" rows="6"></textarea>
                        </div>
                        <div class="mb-3" id="fileNecessari"></div>
                        <div class="mb-5">

                            <label for="fileInput" class="form-label">Allega file</label>
                            <input type="file" name="allegati[]" id="fileInput" style="display: none;" multiple>

                            <!-- Pulsante per aggiungere nuovo allegato -->
                            <div class="attachment-grid mt-0 mb-2 ms-2">
                                <div class="add-new" id="inputGroupFileAddon"
                                    onclick="document.getElementById('fileInput').click()">
                                    <i class="bi bi-plus-lg"></i>
                                </div>
                            </div>

                            <span id="fileNameDisplay" class="ms-2 ">Nessun file selezionato</span>

                        </div>
                        <button type="submit" class="btn btn-primary" id="praticheSubmit">Invia</button>
                    </form>





                    <!-- </div> -->

                </div>
            </div>
        </div>


    </div>

    <!-- Fine Resto della pagina -->



    <!-- Bootstrap2 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>


    <!-- JQuery e JS-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="../js/token.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/loader.js"></script>

</body>

</html>
