            </li>

            <li class="profile">
                <i class='bx bx-log-out' id="log_out"></i>

        </ul>
    </div>
    <!-- Fine Sidebar -->

    <!-- Resto della pagina -->

    <!-- lista -->
    <div class="container-fluid h-100">

        <div class="row h-90 justify-content-center" id="list-view">
            <div class="col-11 d-flex tableContainer">
                <div class="rounded-3 w-100 overflow-hidden">
                    <table class="table table-hover table-striped table-dark rounded">
                        <colgroup>
                            <col> <!-- Tipo -->
                            <!-- <col> --><!-- Stato -->
                            <col> <!-- Data -->
                            <col> <!-- # -->
                            <col> <!-- # -->
                            <col style="width: 115px;"> <!-- Visualizza -->
                        </colgroup>

                        <thead>
                            <tr>
                                <th scope="col">Tipo</th>
                                <!-- <th scope="col">Stato</th> -->
                                <th scope="col">Data Creazione</th>
                                <th scope="col"># Pratica</th>
                                <th scope="col"># Passaggio</th>
                                <th scope="col" class="text-center">

                                </th>
                            </tr>
                        </thead>

                        <tbody class="table-group-divider" id="table-body">

                        </tbody>
                    </table>

                </div>
            </div>
        </div>

        <div class=" pagination" id="pagination-view">
            <ul id="pagination-wrapper"></ul>
        </div>



        <!-- singolo elemento -->

        <div class="row padding-top-3-percento justify-content-center" id="detail-view" style="display: none;">
            <div class="col-11 d-flex">
                <div class="rounded-3 w-100">
                    <div class="row">
                        <div class="col-auto">
                            <i class="bi bi-arrow-left-circle-fill h3" onclick="backToList()"></i>
                        </div>
                    </div>
                    <div class="row detailsElement">
                        <p><b>Titolo: </b><span id="object-name title_ID"></span></p>
                    </div>
                    <div class="row detailsElement">
                        <p><b>ID: </b><span id="object-name ID_ID"></span></p>
                    </div>
                    <div class="row detailsElement">
                        <p><b>Data: </b><span id="object-name data_ID"></span></p>
                    </div>
                    <!-- <div class="row detailsElement">
                        <p><b>Stato: </b><span id="object-name state_ID"></span></p>
                    </div> -->
                    <div class="row detailsElement">
                        <p><b>Descrizione: </b><span id="object-name description_ID"></span></p>
                    </div>
                    <div class="row detailsElement">
                        <p><b>Documenti richiesti: </b><span id="object-name documenti_richiesti">Nessun documento richiesto in questo passaggio.</span></p>
                    </div>
                    <div class="row detailsElement">
                        <p><b>Documenti caricati: </b><span id="object-name documenti_caricati">Nessun documento caricato in questo passaggio.</span></p>
                    </div>


                </div>
            </div>
        </div>

        <div class="container row padding-top-3-percento ms-3" id="listAmministrativi">

        </div>
    </div>

    <!-- Fine Resto della pagina -->
